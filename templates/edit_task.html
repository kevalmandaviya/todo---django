<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Task</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f0ede8;
    --surface: #ffffff;
    --surface2: #f7f5f1;
    --border: #e2ddd6;
    --text: #1a1714;
    --text-sub: #8a8480;
    --accent: #d4500a;
    --done: #2d7a52;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 14px;
  }

  .dark {
    --bg: #0e0d0c;
    --surface: #1a1916;
    --surface2: #211f1c;
    --border: #2c2a26;
    --text: #f0ede8;
    --text-sub: #6b6560;
    --accent: #e8651a;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: background 0.4s, color 0.4s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='0.5' fill='%23000' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow), 0 20px 60px rgba(0,0,0,0.07);
    overflow: hidden;
    animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(18px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── TOP STRIP ── */
  .card-top {
    background: linear-gradient(135deg, var(--accent) 0%, #b83d06 100%);
    padding: 28px 28px 24px;
    position: relative;
    overflow: hidden;
  }

  .card-top::before {
    content: '✎';
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 72px;
    opacity: 0.10;
    line-height: 1;
  }

  .eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }

  /* ── BODY ── */
  .card-body {
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-sub);
    font-weight: 500;
    margin-bottom: 8px;
    display: block;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--text-sub);
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    padding: 13px 14px 13px 38px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]::placeholder { color: var(--text-sub); }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(212,80,10,0.12);
  }

  /* ── ACTIONS ── */
  .actions {
    display: flex;
    gap: 10px;
  }

  .btn-update {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 13px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(212,80,10,0.25);
  }

  .btn-update:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(212,80,10,0.35);
  }

  .btn-update:active { transform: translateY(0); }

  .btn-back {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 13px 18px;
    background: var(--surface2);
    color: var(--text-sub);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .btn-back:hover {
    background: var(--border);
    color: var(--text);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-sub);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 17px;
    box-shadow: var(--shadow);
    transition: transform 0.2s;
    z-index: 10;
  }

  .theme-toggle:hover { transform: rotate(20deg) scale(1.1); }
</style>
</head>
<body>

<!-- Theme toggle (fixed, top-right) -->
<div class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</div>

<div class="card">

  <!-- TOP STRIP -->
  <div class="card-top">
    <div class="eyebrow">Editing task</div>
    <h1 class="title">Edit Task</h1>
  </div>

  <!-- BODY -->
  <div class="card-body">

    <form action="{% url 'edit_task' get_task.id %}" method="POST">
      {% csrf_token %}

      <div>
        <label class="field-label">Task title</label>
        <div class="input-wrap">
          <span class="input-icon">✎</span>
          <input
            type="text"
            name="task"
            value="{{ get_task.title }}"
            placeholder="Update your task..."
            autofocus
          />
        </div>
      </div>

      <div class="divider" style="margin-top:4px;">or</div>

      <div class="actions">
        <a class="btn-back" href="{% url 'home' %}">← Back</a>
        <button class="btn-update" type="submit">✓ &nbsp;Update Task</button>
      </div>

    </form>

  </div>
</div>

<script>
  function toggleTheme() {
    document.body.classList.toggle('dark');
    const dark = document.body.classList.contains('dark');
    localStorage.setItem('theme', dark ? 'dark' : 'light');
    document.getElementById('themeIcon').textContent = dark ? '☀️' : '🌙';
  }

  window.onload = function () {
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('themeIcon').textContent = '☀️';
    }
  };
</script>

</body>
</html>
